<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fff0f3; /* Soft blush background */
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .card {
            background: white; padding: 2rem; border-radius: 30px;
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.2);
            width: 90%; max-width: 400px; text-align: center;
            border: 2px solid #ffccd5;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* Image Styling */
        .her-photo {
            width: 150px; height: 150px; border-radius: 50%;
            object-fit: cover; border: 4px solid #ff8fa3;
            margin-bottom: 1rem;
        }

        #gif { width: 100%; border-radius: 15px; margin-bottom: 1rem; }

        h1 { font-family: 'Dancing Script', cursive; color: #d62828; font-size: 2.2rem; }
        
        #compliment {
            font-size: 1.1rem; color: #555; min-height: 70px;
            margin: 1.5rem 0; transition: 0.5s;
        }

        button {
            background: #ff4d6d; color: white; border: none;
            padding: 12px 25px; border-radius: 50px; cursor: pointer;
            font-size: 1rem; transition: 0.3s;
        }
        button:hover { background: #e63946; transform: translateY(-3px); }
    </style>
</head>
<body>

<div class="card">
    <!-- PLACEHOLDER: Put her photo URL below -->
    <img src="C:\Users\ril\Desktop\html\WhatsApp Image 2026-07-01 at 11.14.07 PM.jpeg" alt="Her" class="her-photo">
    
    <div id="gif-container">
        <img id="gif" src="C:\Users\ril\Desktop\html\huang-pi-tie-che-cat-6937.gif">
    </div>
    
    <h1>For My Favorite Person</h1>
    <p id="compliment">Click to see a reason why you're perfect.</p>
    <button onclick="updateContent()" id="btn">See Reason</button>
</div>

<script>
    const content = [
        { text: "You have the most beautiful smile that lights up my entire day.", gif: "C:\Users\ril\Desktop\html\kuzu420-valentine-17405.gif" },
        { text: "I love how you are so smart and handle everything with such grace.", gif: "C:\Users\ril\Desktop\html\kuzu420-valentine-17405.gif" },
        { text: "Every moment spent with you is a moment I treasure forever.", gif: "C:\Users\ril\Desktop\html\yu-wan-001-panda-6258_512.gif" }
    ];

    function updateContent() {
        const randomIndex = Math.floor(Math.random() * content.length);
        document.getElementById('compliment').style.opacity = 0;
        
        setTimeout(() => {
            document.getElementById('compliment').innerText = content[randomIndex].text;
            document.getElementById('gif').src = content[randomIndex].gif;
            document.getElementById('compliment').style.opacity = 1;
        }, 300);
    }
</script>

</body>
</html>
